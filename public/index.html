<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco de Questões IA — Concursos</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="/favicon_io%20(1)/favicon.ico">
  <link rel="shortcut icon" href="/favicon_io%20(1)/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io%20(1)/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io%20(1)/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io%20(1)/favicon-16x16.png">
  <link rel="manifest" href="/favicon_io%20(1)/site.webmanifest">

  <style>
    /* ============================================================
       CSS — BANCO DE QUESTÕES IA
       ============================================================ */
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --radius: 12px;
      --accent: #0b3d91;
      --accent-light: #1565c0;
      --accent-bg: #e8eef6;
      --green: #2e7d32;
      --green-bg: #e8f5e9;
      --red: #c62828;
      --red-bg: #ffebee;
      --orange: #ef6c00;
      --orange-bg: #fff3e0;
      --gray: #78909c;
      --gray-light: #eceff1;
      --text: #212121;
      --text-secondary: #546e7a;
      --sidebar-w: 280px;
      --header-h: 70px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .header {
      position: sticky; top: 0; z-index: 200;
      background: linear-gradient(135deg, #0a1628 0%, #0b3d91 50%, #1976d2 100%);
      color: #fff;
      padding: 0 24px;
      height: var(--header-h);
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-left .logo { font-size: 1.8rem; }
    .header-left h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.3px; }
    .header-left .badge {
      background: rgba(255,255,255,0.15);
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-right .stats-mini {
      display: flex; gap: 16px; font-size: 0.82rem; font-weight: 500;
    }
    .header-right .stats-mini span { opacity: 0.9; }
    .header-right .stats-mini strong { color: #64b5f6; }

    .sidebar {
      position: fixed; top: var(--header-h); left: 0;
      width: var(--sidebar-w); height: calc(100vh - var(--header-h));
      background: var(--card);
      border-right: 1px solid #e0e0e0;
      overflow-y: auto; z-index: 100;
      padding: 20px 0;
      box-shadow: 2px 0 12px rgba(0,0,0,0.04);
    }
    .sidebar h3 {
      padding: 0 20px; margin-bottom: 12px;
      font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--gray);
      font-weight: 700;
    }
    .sidebar .filter-group { padding: 0 16px; margin-bottom: 20px; }
    .sidebar label { display: block; font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 5px; font-weight: 600; }
    .sidebar select, .sidebar input[type="text"] {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.82rem; background: var(--gray-light);
      color: var(--text); outline: none; transition: border 0.2s;
    }
    .sidebar select:focus, .sidebar input:focus { border-color: var(--accent-light); }

    .sidebar .actions { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 16px; border: none; border-radius: 8px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; text-align: center;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(11,61,145,0.3); }
    .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-outline:hover { background: var(--accent-bg); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { background: #388e3c; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #d32f2f; }
    .btn-warning { background: var(--orange); color: #fff; }
    .btn-warning:hover { background: #f57c00; }
    .btn-sm { padding: 7px 12px; font-size: 0.76rem; }

    .sidebar .summary-box {
      margin: 20px 16px 0; padding: 16px;
      background: linear-gradient(135deg, #e8eef6, #f3f7fd);
      border-radius: 10px; border: 1px solid #d0dbe8;
    }
    .summary-box h4 { font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
    .summary-box .stat-row { display: flex; justify-content: space-between; font-size: 0.82rem; margin-bottom: 6px; }
    .summary-box .stat-row .label { color: var(--text-secondary); }
    .summary-box .stat-row .value { font-weight: 700; color: var(--text); }
    .summary-box .progress-bar { height: 8px; background: #ddd; border-radius: 4px; margin-top: 10px; overflow: hidden; }
    .summary-box .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #66bb6a); border-radius: 4px; transition: width 0.4s ease; }
    .summary-box .pct { text-align: center; font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-top: 6px; }

    .main {
      margin-left: var(--sidebar-w);
      padding: 28px 32px 60px;
      max-width: 960px;
    }

    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 24px; padding: 14px 20px;
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .status-bar .info { font-size: 0.88rem; color: var(--text-secondary); }
    .status-bar .info strong { color: var(--accent); }
    .status-bar .controls { display: flex; gap: 8px; flex-wrap: wrap; }

    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
      border-left: 5px solid var(--accent);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .question-card.answered-correct { border-left-color: var(--green); }
    .question-card.answered-wrong { border-left-color: var(--red); }

    .q-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #eee;
    }
    .q-header .q-num {
      font-weight: 800; font-size: 0.92rem; color: var(--accent);
    }
    .q-header .q-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 0.68rem;
      font-weight: 600; letter-spacing: 0.3px;
    }
    .tag-disciplina { background: var(--accent-bg); color: var(--accent); }
    .tag-assunto { background: #fff3e0; color: #e65100; }
    .tag-facil { background: #e8f5e9; color: #2e7d32; }
    .tag-medio { background: #fff8e1; color: #f57f17; }
    .tag-dificil { background: #fce4ec; color: #c62828; }
    .tag-fonte { background: #f3e5f5; color: #6a1b9a; }

    .q-body { padding: 20px; }
    .q-body .instrucao {
      font-size: 0.8rem; color: var(--text-secondary);
      margin-bottom: 8px; font-style: italic;
    }
    .q-body .enunciado {
      font-size: 0.95rem; line-height: 1.7;
      color: var(--text);
    }

    .q-footer {
      padding: 14px 20px;
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
      border-top: 1px solid #f0f0f0;
    }
    .q-footer .btn-answer {
      padding: 9px 28px; border: 2px solid #ddd;
      border-radius: 8px; background: #fff;
      font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      color: var(--text);
    }
    .btn-answer:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .btn-answer.selected-correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .btn-answer.selected-wrong { border-color: var(--red); background: var(--red-bg); color: var(--red); }
    .btn-answer:disabled { opacity: 0.6; cursor: default; }
    .btn-answer:disabled:hover { border-color: #ddd; color: var(--text); background: #fff; }
    .btn-answer.selected-correct:disabled:hover { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .btn-answer.selected-wrong:disabled:hover { border-color: var(--red); background: var(--red-bg); color: var(--red); }

    .feedback {
      display: none; margin-top: 14px; padding: 14px 18px;
      border-radius: 8px; font-size: 0.85rem; line-height: 1.6;
    }
    .feedback.show { display: block; }
    .feedback.correct { background: var(--green-bg); border: 1px solid #a5d6a7; color: #1b5e20; }
    .feedback.wrong { background: var(--red-bg); border: 1px solid #ef9a9a; color: #b71c1c; }
    .feedback strong { display: block; margin-bottom: 4px; }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text); }

    .menu-toggle {
      display: none;
      background: none; border: none; color: #fff;
      font-size: 1.5rem; cursor: pointer;
    }

    @media (max-width: 860px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 150;
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
      }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 20px 16px 40px; }
      .menu-toggle { display: block; }
      .overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.4); z-index: 140;
      }
      .overlay.show { display: block; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #bbb; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #999; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .question-card { animation: fadeInUp 0.35s ease both; }
    .question-card:nth-child(2) { animation-delay: 0.05s; }
    .question-card:nth-child(3) { animation-delay: 0.1s; }
    .question-card:nth-child(4) { animation-delay: 0.15s; }
    .question-card:nth-child(5) { animation-delay: 0.2s; }
  </style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <span class="logo">📚</span>
    <h1>Banco de Questões IA</h1>
    <span class="badge">Certo ou Errado</span>
  </div>
  <div class="header-right">
    <div class="stats-mini">
      <span>📦 Total: <strong id="hTotal">0</strong></span>
      <span>✅ Acertos: <strong id="hCorrect">0</strong></span>
      <span>📊 Taxa: <strong id="hRate">—</strong></span>
    </div>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <h3>🔍 Filtros</h3>

  <div class="filter-group">
    <label for="filtDisciplina">Disciplina</label>
    <select id="filtDisciplina" onchange="renderQuestions()">
      <option value="">Todas</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="filtAssunto">Assunto</label>
    <select id="filtAssunto" onchange="renderQuestions()">
      <option value="">Todos</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="filtDificuldade">Dificuldade</label>
    <select id="filtDificuldade" onchange="renderQuestions()">
      <option value="">Todas</option>
      <option value="Fácil">Fácil</option>
      <option value="Médio">Médio</option>
      <option value="Difícil">Difícil</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="filtFonte">Fonte/Referência</label>
    <select id="filtFonte" onchange="renderQuestions()">
      <option value="">Todas</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="filtStatus">Status</label>
    <select id="filtStatus" onchange="renderQuestions()">
      <option value="">Todas</option>
      <option value="pendente">Não respondidas</option>
      <option value="correta">Acertei</option>
      <option value="errada">Errei</option>
    </select>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="shuffleAndRender()">🔀 Embaralhar</button>
    <button class="btn btn-outline" onclick="revealAll()">👁️ Ver Gabaritos</button>
    <button class="btn btn-danger btn-sm" onclick="resetAll()">🔄 Reiniciar Tudo</button>
  </div>

  <div class="summary-box">
    <h4>📊 Desempenho</h4>
    <div class="stat-row">
      <span class="label">Respondidas</span>
      <span class="value" id="sAnswered">0</span>
    </div>
    <div class="stat-row">
      <span class="label">Acertos</span>
      <span class="value" id="sCorrect" style="color:var(--green)">0</span>
    </div>
    <div class="stat-row">
      <span class="label">Erros</span>
      <span class="value" id="sWrong" style="color:var(--red)">0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="sBar" style="width:0%"></div></div>
    <div class="pct" id="sPct">—</div>
  </div>
</nav>

<main class="main">
  <div class="status-bar">
    <div class="info">
      Exibindo <strong id="showCount">0</strong> de <strong id="totalCount">0</strong> questões
    </div>
    <div class="controls">
      <button class="btn btn-outline btn-sm" onclick="shuffleAndRender()">🔀 Embaralhar</button>
      <button class="btn btn-outline btn-sm" onclick="renderQuestions()">📋 Ordem Original</button>
    </div>
  </div>

  <div id="questionsContainer"></div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">🔍</div>
    <h3>Nenhuma questão encontrada</h3>
    <p>Tente mudar os filtros ou adicione novas questões ao banco.</p>
  </div>
</main>

<script>
const QUESTOES = [];
let isLoading = false;
let currentOrder = [];
let answers = {};
let shuffled = false;

loadProgress();

document.addEventListener("DOMContentLoaded", () => {
  loadQuestoes();
});

async function loadQuestoes() {
  if (isLoading) return;

  isLoading = true;
  showLoading(true);

  try {
    const response = await fetch('/api/questoes');
    if (!response.ok) {
      throw new Error(`Erro HTTP: ${response.status}`);
    }

    const data = await response.json();
    QUESTOES.length = 0;
    QUESTOES.push(...data);
    populateFilters();
    renderQuestions();
  } catch (error) {
    console.error('Erro ao carregar questões:', error);
    showError('Erro ao carregar questões. Tente novamente.');
  } finally {
    isLoading = false;
    showLoading(false);
  }
}

function showLoading(show) {
  if (!show) return;
  const container = document.getElementById("questionsContainer");
  const emptyState = document.getElementById("emptyState");
  container.innerHTML = '<div style="text-align: center; padding: 40px;"><div>Carregando questões...</div></div>';
  emptyState.style.display = "none";
}

function showError(message) {
  const container = document.getElementById("questionsContainer");
  container.innerHTML = `<div style="text-align: center; padding: 40px; color: #c62828;"><div>❌ ${message}</div><button onclick="loadQuestoes()" style="margin-top: 10px; padding: 8px 16px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer;">Tentar Novamente</button></div>`;
}

function resetFilterSelect(id, placeholder) {
  const select = document.getElementById(id);
  const currentValue = select.value;
  select.innerHTML = `<option value="">${placeholder}</option>`;
  return currentValue;
}

function populateFilters() {
  const disciplinas = [...new Set(QUESTOES.map(q => q.disciplina).filter(Boolean))].sort();
  const assuntos = [...new Set(QUESTOES.map(q => q.assunto).filter(Boolean))].sort();
  const fontes = [...new Set(QUESTOES.map(q => q.fonte).filter(Boolean))].sort();

  const selectedDisc = resetFilterSelect("filtDisciplina", "Todas");
  const selectedAss = resetFilterSelect("filtAssunto", "Todos");
  const selectedFonte = resetFilterSelect("filtFonte", "Todas");

  const selDisc = document.getElementById("filtDisciplina");
  disciplinas.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    selDisc.appendChild(opt);
  });

  const selAss = document.getElementById("filtAssunto");
  assuntos.forEach(a => {
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    selAss.appendChild(opt);
  });

  const selFonte = document.getElementById("filtFonte");
  fontes.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f.length > 35 ? f.substring(0, 35) + "…" : f;
    selFonte.appendChild(opt);
  });

  if (disciplinas.includes(selectedDisc)) selDisc.value = selectedDisc;
  if (assuntos.includes(selectedAss)) selAss.value = selectedAss;
  if (fontes.includes(selectedFonte)) selFonte.value = selectedFonte;
}

function getFilteredIds() {
  const disc = document.getElementById("filtDisciplina").value;
  const ass = document.getElementById("filtAssunto").value;
  const dif = document.getElementById("filtDificuldade").value;
  const fnt = document.getElementById("filtFonte").value;
  const sta = document.getElementById("filtStatus").value;

  return QUESTOES.filter(q => {
    if (disc && q.disciplina !== disc) return false;
    if (ass && q.assunto !== ass) return false;
    if (dif && q.dificuldade !== dif) return false;
    if (fnt && q.fonte !== fnt) return false;

    const answer = answers[q.id];
    if (sta === "pendente" && answer) return false;
    if (sta === "correta" && (!answer || !answer.correto)) return false;
    if (sta === "errada" && (!answer || answer.correto)) return false;
    return true;
  }).map(q => q.id);
}

function renderQuestions() {
  shuffled = false;
  currentOrder = getFilteredIds();
  render(currentOrder);
}

function shuffleAndRender() {
  currentOrder = getFilteredIds();
  for (let i = currentOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentOrder[i], currentOrder[j]] = [currentOrder[j], currentOrder[i]];
  }
  shuffled = true;
  render(currentOrder);
}

function render(ids) {
  const container = document.getElementById("questionsContainer");
  const emptyState = document.getElementById("emptyState");

  document.getElementById("showCount").textContent = ids.length;
  document.getElementById("totalCount").textContent = QUESTOES.length;

  if (ids.length === 0) {
    container.innerHTML = "";
    emptyState.style.display = "block";
    updateStats();
    return;
  }
  emptyState.style.display = "none";

  let html = "";
  ids.forEach((id, displayNum) => {
    const q = QUESTOES.find(item => item.id === id);
    if (!q) return;

    const num = displayNum + 1;
    const ans = answers[id];
    const cardClass = ans ? (ans.correto ? "answered-correct" : "answered-wrong") : "";
    const disabled = ans ? "disabled" : "";

    let difClass = "tag-medio";
    if (q.dificuldade === "Fácil") difClass = "tag-facil";
    else if (q.dificuldade === "Difícil") difClass = "tag-dificil";

    let feedbackHTML = "";
    if (ans) {
      const fbClass = ans.correto ? "correct" : "wrong";
      const fbIcon = ans.correto ? "✅" : "❌";
      feedbackHTML = `
        <div class="feedback show ${fbClass}">
          <strong>${fbIcon} Gabarito: ${q.gabarito === "C" ? "CERTO" : "ERRADO"}</strong>
          ${escapeHtml(q.justificativa || "")}
          ${q.fonte ? '<br><em style="font-size:0.78rem;opacity:0.8;">📖 ' + escapeHtml(q.fonte) + '</em>' : ''}
        </div>`;
    }

    let btnCClass = "", btnEClass = "";
    if (ans) {
      if (ans.escolha === "C") {
        btnCClass = ans.correto ? "selected-correct" : "selected-wrong";
      } else if (ans.escolha === "E") {
        btnEClass = ans.correto ? "selected-correct" : "selected-wrong";
      }

      if (!ans.correto || ans.escolha === null) {
        if (q.gabarito === "C") btnCClass += " selected-correct";
        else btnEClass += " selected-correct";
      }
    }

    html += `
      <div class="question-card ${cardClass}" id="card-${id}">
        <div class="q-header">
          <span class="q-num">Questão ${num}</span>
          <div class="q-tags">
            <span class="tag tag-disciplina">${escapeHtml(q.disciplina)}</span>
            <span class="tag tag-assunto">${escapeHtml(q.assunto)}</span>
            <span class="tag ${difClass}">${escapeHtml(q.dificuldade)}</span>
            ${q.fonte ? '<span class="tag tag-fonte">📖 ' + escapeHtml(q.fonte.length > 25 ? q.fonte.substring(0,25) + '…' : q.fonte) + '</span>' : ''}
          </div>
        </div>
        <div class="q-body">
          <p class="instrucao">Julgue o item seguinte.</p>
          <p class="enunciado">${escapeHtml(q.enunciado)}</p>
        </div>
        <div class="q-footer">
          <button class="btn-answer ${btnCClass.trim()}" ${disabled} onclick="answer(${id}, 'C')">✅ CERTO</button>
          <button class="btn-answer ${btnEClass.trim()}" ${disabled} onclick="answer(${id}, 'E')">❌ ERRADO</button>
          ${feedbackHTML}
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
  updateStats();
}

function answer(id, escolha) {
  const q = QUESTOES.find(item => item.id === id);
  if (!q) return;

  const correto = escolha === q.gabarito;
  answers[id] = { escolha, correto };
  saveProgress();
  render(currentOrder);

  setTimeout(() => {
    const card = document.getElementById("card-" + id);
    if (card) card.scrollIntoView({ behavior: "smooth", block: "center" });
  }, 100);
}

function revealAll() {
  currentOrder.forEach(id => {
    if (!answers[id]) {
      answers[id] = { escolha: null, correto: false, revealed: true };
    }
  });
  saveProgress();
  render(currentOrder);
}

function resetAll() {
  if (!confirm("Tem certeza que deseja reiniciar? Todo o progresso será perdido.")) return;
  answers = {};
  localStorage.removeItem("bancoQuestoes_answers");
  renderQuestions();
}

function updateStats() {
  const total = Object.keys(answers).filter(k => answers[k] && answers[k].escolha !== null).length;
  const correct = Object.keys(answers).filter(k => answers[k] && answers[k].correto).length;
  const wrong = total - correct;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

  document.getElementById("hTotal").textContent = QUESTOES.length;
  document.getElementById("hCorrect").textContent = correct;
  document.getElementById("hRate").textContent = total > 0 ? pct + "%" : "—";

  document.getElementById("sAnswered").textContent = total;
  document.getElementById("sCorrect").textContent = correct;
  document.getElementById("sWrong").textContent = wrong;
  document.getElementById("sBar").style.width = pct + "%";
  document.getElementById("sPct").textContent = total > 0 ? pct + "%" : "—";
}

function saveProgress() {
  try {
    localStorage.setItem("bancoQuestoes_answers", JSON.stringify(answers));
  } catch (error) {
    console.error('Erro ao salvar progresso:', error);
  }
}

function loadProgress() {
  try {
    const saved = localStorage.getItem("bancoQuestoes_answers");
    if (saved) answers = JSON.parse(saved);
  } catch (error) {
    console.error('Erro ao carregar progresso:', error);
  }
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}
</script>
